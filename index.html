<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Expense Tracker</h1>


        <div class="dashboard">
            <h2>Your Balance</h2>
            <h1 id="balance">$sgdfsggsfsfgfgfgfgfgfg</h1>
            <!-- 9840110440 -->
            <div class="slabs">
                <div class="income slab">
                    <h3>Income</h3>
                    <p id="income_val">$ddd</p>
                </div>
                <div class="expense slab">
                    <h3>Expense</h3>
                    <p id="expense_val">$sssss</p>
                </div>
            </div>
        </div>

        <div class="transactions">

            <div class="transaction_history">
                <h2>Transactions</h2>
                <div class="cards">
                    <ul id="transaction_list">
                        <!--  yesma halni -->


                    </ul>
                    
                    <button id="Reset">Reset</button>
                </div>
            </div>



            <div class="add_transactions">
                <h2>Add Transactions</h2>

                    <form id="transaction_form">
                        <div class="div">
                            <label for="desription">Description</label>
                            <input type="text" name="desription" id="description"
                                placeholder="Enter the description for transaction" required>
                        </div>

                        <div class="div">
                            <label for="amount">Amount</label>
                            <input type="number" name="amount" id="amount" placeholder="Enter the amount" required>
                            <small>Use (-) negative for expenses.</small>
                        </div>

                        <button type="submit" id="add_btn">Add Transaction</button>
                    </form>
            </div>

        </div>


    </div>

    <script src="script.js"></script>
</body>

</html>
