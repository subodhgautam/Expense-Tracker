<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <div class="dashboard">
            <p>Your Balance</p>
            <h2 id="balance">$sgdfsggsfsfgfgfgfgfgfg</h2>
<!-- 9840110440 -->
            <div class="slabs">
                <div class="income slab">
                    <h3>Income</h3>
                    <p id="income_val" >$ddd</p>
                </div>
                <div class="expense slab">
                    <h3>Expense</h3>
                    <p id="expense_val" >$sssss</p>
                </div>
            </div>
        </div>

        <div class="transactions">

            <div class="transaction_history">
                <h3>Transactions</h3>
                <!--  -->
                <div class="cards">
                    <div class="card">
                        <p>Paycheck</p>

                    </div>
                </div>
            </div>
            
            
            
            <div class="transaction_form">
                <h3>Add Transactions</h3>
                <form action="">
                    
                    <div class="div">
                        <label for="desription">Description</label>
                        <input type="text" name="desription" id="description"
                        placeholder="Enter the description for transaction">
                    </div>
                    
                    <div class="div">
                        <label for="amount">Amount</label>
                        <input type="number" name="amount" id="amount" placeholder="Enter the amount">
                    </div>
                    
                    <button type="submit" id="add_btn">Add Transaction</button>
                    
                </div>

            </form>
        </div>




    </div>

    <script src="script.js"></script>
</body>

</html>
